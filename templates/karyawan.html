<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kelola Karyawan | Maharatu</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <img src="{{ url_for('static', filename='images/logo_mc.png') }}" alt="MC" height="90" class="me-2">
                MAHARATU USERS
            </a>
            <a href="/" class="btn btn-outline-light btn-sm">Kembali</a>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white fw-bold">Tambah Akun Baru</div>
                    <div class="card-body">
                        <form action="/tambah_karyawan" method="POST">
                            <div class="mb-3">
                                <label class="form-label small">Username</label>
                                <input type="text" name="username" class="form-control" placeholder="Contoh: kasir_dua" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">Password</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">Role/Jabatan</label>
                                <select name="role" class="form-select">
                                    <option value="kasir">Kasir</option>
                                    <option value="owner">Owner (Akses Penuh)</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Simpan Akun</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-0 text-center">
                        <table class="table table-hover mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>Username</th>
                                    <th>Role</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for u in users %}
                                <tr>
                                    <td class="fw-bold">{{ u.username }}</td>
                                    <td>
                                        <span class="badge {{ 'bg-primary' if u.role == 'owner' else 'bg-secondary' }}">
                                            {{ u.role.upper() }}
                                        </span>
                                    </td>
                                    <td>
                                        <a href="/hapus_user/{{ u.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Hapus akun ini?')">
                                            <i class="fa fa-trash"></i>
                                        </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
