<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Maharatu Collection</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #1a1d21; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 20px; border-top: 6px solid #d4af37; width: 100%; max-width: 400px; }
        .btn-login { background: #1a1d21; color: #d4af37; border: none; font-weight: bold; }
        .btn-login:hover { background: #d4af37; color: #1a1d21; }
        .logo-text { color: #1a1d21; font-weight: 800; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="login-card shadow-lg">
        <div class="text-center mb-4">
            <h3 class="logo-text">MAHARATU</h3>
            <p class="text-muted small">Point of Sale System</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold small text-muted">USERNAME</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold small text-muted">PASSWORD</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login btn-lg w-100">MASUK KE SISTEM</button>
        </form>
    </div>
</body>
</html>
